<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotspot Login – Hotspay</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: linear-gradient(135deg, #1a2236 0%, #2d4a8a 100%); min-height: 100vh; }
    .hotspot-card { max-width: 400px; margin: 0 auto; }
    .package-btn { border: 2px solid #e3e8f0; border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: all .2s; background: #fff; }
    .package-btn:hover, .package-btn.selected { border-color: #4f8ef7; background: rgba(79,142,247,.07); }
    .divider { display: flex; align-items: center; gap: 12px; color: #aaa; margin: 18px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e3e8f0; }
  </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center min-vh-100 p-3">
  <div class="hotspot-card w-100">

    <!-- Logo -->
    <div class="hotspot-logo mb-4">
      <div class="logo-icon">H</div>
      <div>
        <span class="logo-name">Hotspay</span>
        <span class="logo-tag">Free & Fast Internet</span>
      </div>
    </div>

    <!-- Signal indicator -->
    <div class="text-center mb-3">
      <i class="bi bi-wifi text-success" style="font-size:32px;"></i>
      <p class="text-muted small mt-1 mb-0" id="lbl-connected">Connect to the internet</p>
    </div>

    <!-- Alert -->
    <div id="alert-box" class="alert d-none mb-3 py-2"></div>

    <!-- Login form -->
    <form id="hotspot-form" novalidate>
      <div class="mb-3">
        <label class="form-label fw-semibold" id="lbl-voucher">Voucher Code (Username)</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-ticket-perforated"></i></span>
          <input type="text" class="form-control form-control-lg" id="hs-username" placeholder="HSP-001"
                 autocomplete="username" autocapitalize="off" required />
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" id="lbl-pass">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control form-control-lg" id="hs-password" placeholder="••••••••"
                 autocomplete="current-password" required />
        </div>
      </div>

      <input type="hidden" id="hs-dst"  name="dst"  value="" />
      <input type="hidden" id="hs-popup" name="popup" value="true" />

      <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5" id="btn-login">
        <i class="bi bi-wifi me-2"></i><span id="btn-text">Connect</span>
        <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
      </button>
    </form>

    <div class="divider"><span>OR</span></div>

    <!-- Buy voucher link -->
    <a href="/self-service.html" class="btn btn-outline-primary w-100 py-2">
      <i class="bi bi-cart me-2"></i><span id="lbl-buy">Buy a Voucher</span>
    </a>

    <!-- Language selector -->
    <div class="d-flex justify-content-center gap-2 mt-4">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="sw">SW</button>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>

    <p class="text-center text-muted small mt-3 mb-0">
      <i class="bi bi-shield-lock me-1"></i>Secured by Hotspay
    </p>
  </div>
</div>

<script>
  // ── i18n ──────────────────────────────────────────────────────────────────
  const i18n = {
    en: { connected:'Connect to the internet', voucher:'Voucher Code (Username)', pass:'Password', btn:'Connect', buy:'Buy a Voucher', err_empty:'Please enter your voucher code and password.', err_fail:'Invalid voucher. Please check and try again.', err_net:'Connection error. Please try again.' },
    sw: { connected:'Unganisha mtandao', voucher:'Nambari ya Vocha (Jina la Mtumiaji)', pass:'Nenosiri', btn:'Unganisha', buy:'Nunua Vocha', err_empty:'Tafadhali ingiza nambari ya vocha na nenosiri.', err_fail:'Vocha batili. Angalia na ujaribu tena.', err_net:'Hitilafu ya mtandao. Jaribu tena.' },
    fr: { connected:'Connectez-vous à Internet', voucher:'Code Bon (Nom d\'utilisateur)', pass:'Mot de passe', btn:'Connecter', buy:'Acheter un Bon', err_empty:'Veuillez entrer votre code bon et mot de passe.', err_fail:'Bon invalide. Vérifiez et réessayez.', err_net:'Erreur de connexion. Réessayez.' }
  };
  let lang = localStorage.getItem('lang') || 'en';

  // ── Language buttons ──────────────────────────────────────────────────────
  const langBtns = document.querySelectorAll('.lang-btn');
  function applyLang(l) {
    lang = l; localStorage.setItem('lang', l);
    langBtns.forEach(b => b.classList.toggle('active', b.dataset.lang === l));
    const t = i18n[l] || i18n.en;
    document.getElementById('lbl-connected').textContent = t.connected;
    document.getElementById('lbl-voucher').textContent   = t.voucher;
    document.getElementById('lbl-pass').textContent      = t.pass;
    document.getElementById('btn-text').textContent      = t.btn;
    document.getElementById('lbl-buy').textContent       = t.buy;
    document.documentElement.lang = l;
  }
  langBtns.forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));
  applyLang(lang);

  // ── Read MikroTik parameters from query string ────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const loginUrl = params.get('link-login-only') || params.get('link-login') || (window.location.origin + '/login');
  const dst      = params.get('link-orig') || params.get('dst') || '';
  document.getElementById('hs-dst').value = dst;

  // ── Style fix – override hotspot page gradient ────────────────────────────
  // (page background already set via inline style)

  // ── Form submit ───────────────────────────────────────────────────────────
  document.getElementById('hotspot-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const username = document.getElementById('hs-username').value.trim();
    const password = document.getElementById('hs-password').value;
    const alertBox = document.getElementById('alert-box');
    const t        = i18n[lang] || i18n.en;

    alertBox.className = 'alert d-none mb-3 py-2';
    if (!username || !password) {
      alertBox.className = 'alert alert-warning mb-3 py-2';
      alertBox.textContent = t.err_empty;
      return;
    }

    document.getElementById('btn-login').disabled = true;
    document.getElementById('btn-spinner').classList.remove('d-none');

    try {
      // Build a form POST to MikroTik login URL (standard hotspot login)
      const form = document.createElement('form');
      form.method  = 'POST';
      form.action  = loginUrl;

      const fields = { username, password, dst, popup: 'true' };
      for (const [k, v] of Object.entries(fields)) {
        const inp = document.createElement('input');
        inp.type = 'hidden'; inp.name = k; inp.value = v;
        form.appendChild(inp);
      }
      document.body.appendChild(form);
      form.submit();
    } catch {
      alertBox.className = 'alert alert-danger mb-3 py-2';
      alertBox.textContent = t.err_net;
      document.getElementById('btn-login').disabled = false;
      document.getElementById('btn-spinner').classList.add('d-none');
    }
  });
</script>
</body>
</html>
