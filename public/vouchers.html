<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vouchers – Hotspay</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <a href="/" class="sidebar-brand"><div class="brand-icon">H</div><span class="brand-text">Hotspay</span></a>
  <div class="sidebar-nav">
    <span class="nav-section-label">Main</span>
    <a href="/" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/customers.html" class="nav-link"><i class="bi bi-people"></i> Customers</a>
    <a href="/vouchers.html" class="nav-link active"><i class="bi bi-ticket-perforated"></i> Vouchers</a>
    <a href="/payments.html" class="nav-link"><i class="bi bi-credit-card"></i> Payments</a>
    <span class="nav-section-label">Network</span>
    <a href="/routers.html" class="nav-link"><i class="bi bi-router"></i> Routers</a>
    <a href="/vouchers.html#profiles" class="nav-link"><i class="bi bi-layers"></i> Profiles</a>
    <span class="nav-section-label">Analytics</span>
    <a href="/reports.html" class="nav-link"><i class="bi bi-bar-chart-line"></i> Reports</a>
    <span class="nav-section-label">Account</span>
    <a href="#" class="nav-link" id="nav-settings"><i class="bi bi-gear"></i> Settings</a>
    <a href="#" class="nav-link text-danger" id="nav-logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </div>
</nav>

<div class="main-wrapper">
  <div class="topbar">
    <button class="btn-icon d-md-none" id="sidebar-toggle"><i class="bi bi-list"></i></button>
    <span class="topbar-title">Vouchers</span>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <select class="form-select form-select-sm" id="lang-select" style="width:auto;"><option value="en">EN</option><option value="sw">SW</option><option value="fr">FR</option></select>
      <button class="btn-icon" id="theme-toggle"><i class="bi bi-moon"></i></button>
      <div class="user-avatar" id="user-avatar">A</div>
    </div>
  </div>

  <div class="page-content">
    <div class="page-header">
      <h4><i class="bi bi-ticket-perforated me-2 text-accent"></i>Vouchers</h4>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" id="btn-print"><i class="bi bi-printer me-1"></i>Print</button>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#generateModal"><i class="bi bi-plus-lg me-1"></i>Generate</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="card mb-3">
      <div class="card-body py-2">
        <div class="row g-2 align-items-center">
          <div class="col-md-4">
            <input type="search" class="form-control form-control-sm" id="search-input" placeholder="Search username…" />
          </div>
          <div class="col-md-2">
            <select class="form-select form-select-sm" id="filter-status">
              <option value="">All Status</option>
              <option value="unused">Unused</option>
              <option value="used">Used</option>
              <option value="expired">Expired</option>
            </select>
          </div>
          <div class="col-md-3">
            <select class="form-select form-select-sm" id="filter-profile">
              <option value="">All Profiles</option>
            </select>
          </div>
          <div class="col-auto ms-auto">
            <span class="text-muted small" id="count-label">–</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead><tr><th><input type="checkbox" id="select-all" /></th><th>Username</th><th>Password</th><th>Profile</th><th>Status</th><th>Amount</th><th>Expires</th><th>Actions</th></tr></thead>
            <tbody id="vouchers-tbody"><tr><td colspan="8" class="text-center py-4 text-muted"><span class="spinner-border spinner-border-sm me-2"></span>Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Bulk actions bar -->
    <div id="bulk-bar" class="card mt-2 d-none">
      <div class="card-body py-2 d-flex align-items-center gap-2">
        <span class="text-muted small" id="selected-count"></span>
        <button class="btn btn-sm btn-outline-primary" id="btn-push-selected"><i class="bi bi-upload me-1"></i>Push to MikroTik</button>
        <button class="btn btn-sm btn-outline-danger" id="btn-delete-selected"><i class="bi bi-trash me-1"></i>Delete Selected</button>
      </div>
    </div>
  </div>
</div>

<!-- Generate Modal -->
<div class="modal fade" id="generateModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title"><i class="bi bi-ticket-perforated me-2"></i>Generate Vouchers</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div id="gen-alert" class="alert d-none"></div>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label fw-semibold">Count <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="gen-count" value="10" min="1" max="500" />
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">Profile <span class="text-danger">*</span></label>
            <select class="form-select" id="gen-profile"><option value="">Select profile…</option></select>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Router <span class="text-danger">*</span></label>
            <select class="form-select" id="gen-router"><option value="">Select router…</option></select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="btn-generate"><i class="bi bi-ticket-perforated me-1"></i>Generate</button>
      </div>
    </div>
  </div>
</div>

<!-- Push Single Modal -->
<div class="modal fade" id="pushModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header border-0"><h5 class="modal-title">Push to MikroTik</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body text-center">
        <p>Push voucher <strong id="push-username"></strong> to MikroTik?</p>
        <div id="push-alert" class="alert d-none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="btn-confirm-push">Push</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login';
  const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  const storedUser = JSON.parse(localStorage.getItem('user') || '{}');
  if (storedUser.name) document.getElementById('user-avatar').textContent = storedUser.name.charAt(0).toUpperCase();

  document.getElementById('nav-logout').addEventListener('click', e => { e.preventDefault(); localStorage.clear(); window.location.href = '/login'; });
  document.getElementById('sidebar-toggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

  const themeBtn = document.getElementById('theme-toggle');
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  themeBtn.querySelector('i').className = savedTheme === 'dark' ? 'bi bi-sun' : 'bi bi-moon';
  themeBtn.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    themeBtn.querySelector('i').className = next === 'dark' ? 'bi bi-sun' : 'bi bi-moon';
  });

  const langSel = document.getElementById('lang-select');
  langSel.value = localStorage.getItem('lang') || 'en';
  langSel.addEventListener('change', () => localStorage.setItem('lang', langSel.value));

  function showToast(msg, type = 'info') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div'); el.className = `toast-msg toast-${type}`; el.textContent = msg; c.appendChild(el); setTimeout(() => el.remove(), 3500);
  }
  function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  let allVouchers = [], profiles = [], routers = [];
  let selectedIds = new Set();

  async function loadProfiles() {
    const res = await fetch('/api/profiles', { headers });
    const data = await res.json();
    profiles = data.success ? (data.data.profiles || data.data || []) : [];
    const sel1 = document.getElementById('filter-profile');
    const sel2 = document.getElementById('gen-profile');
    profiles.forEach(p => {
      sel1.add(new Option(p.display_name || p.name, p.id));
      sel2.add(new Option(p.display_name || p.name, p.id));
    });
  }

  async function loadRouters() {
    const res = await fetch('/api/routers', { headers });
    const data = await res.json();
    routers = data.success ? (data.data.routers || data.data || []) : [];
    const sel = document.getElementById('gen-router');
    routers.forEach(r => sel.add(new Option(`${r.name} (${r.host})`, r.id)));
  }

  async function loadVouchers() {
    try {
      const status  = document.getElementById('filter-status').value;
      const profile = document.getElementById('filter-profile').value;
      let url = '/api/vouchers?';
      if (status)  url += `status=${status}&`;
      if (profile) url += `profile_id=${profile}&`;
      const res  = await fetch(url, { headers });
      if (res.status === 401) { localStorage.clear(); window.location.href = '/login'; }
      const data = await res.json();
      allVouchers = data.success ? (data.data.vouchers || data.data || []) : [];
      renderVouchers(allVouchers);
    } catch { showToast('Failed to load vouchers', 'error'); }
  }

  function statusBadge(v) {
    if (v.is_expired) return '<span class="badge bg-secondary">Expired</span>';
    if (v.is_used)    return '<span class="badge bg-warning text-dark">Used</span>';
    return '<span class="badge bg-success">Available</span>';
  }

  function renderVouchers(list) {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = q ? list.filter(v => (v.username||'').toLowerCase().includes(q)) : list;
    document.getElementById('count-label').textContent = filtered.length + ' voucher(s)';
    const tbody = document.getElementById('vouchers-tbody');
    if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No vouchers found</td></tr>'; return; }
    tbody.innerHTML = filtered.map(v => {
      const prof = profiles.find(p => p.id == v.profile_id);
      return `<tr>
        <td><input type="checkbox" class="row-check" data-id="${v.id}" ${selectedIds.has(v.id)?'checked':''}/></td>
        <td><code>${escHtml(v.username)}</code></td>
        <td><code>${escHtml(v.password)}</code></td>
        <td>${prof ? escHtml(prof.display_name || prof.name) : '–'}</td>
        <td>${statusBadge(v)}</td>
        <td>KES ${parseFloat(v.amount||0).toLocaleString()}</td>
        <td>${v.expires_at ? new Date(v.expires_at).toLocaleDateString() : '–'}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-1" onclick="openPush(${v.id},'${escHtml(v.username)}')" title="Push to MikroTik"><i class="bi bi-upload"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteVoucher(${v.id})" title="Delete"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`;
    }).join('');

    document.querySelectorAll('.row-check').forEach(cb => {
      cb.addEventListener('change', function () {
        const id = parseInt(this.dataset.id);
        if (this.checked) selectedIds.add(id); else selectedIds.delete(id);
        updateBulkBar();
      });
    });
  }

  function updateBulkBar() {
    const bar = document.getElementById('bulk-bar');
    if (selectedIds.size > 0) {
      bar.classList.remove('d-none');
      document.getElementById('selected-count').textContent = selectedIds.size + ' selected';
    } else {
      bar.classList.add('d-none');
    }
  }

  document.getElementById('select-all').addEventListener('change', function () {
    document.querySelectorAll('.row-check').forEach(cb => {
      cb.checked = this.checked;
      const id = parseInt(cb.dataset.id);
      if (this.checked) selectedIds.add(id); else selectedIds.delete(id);
    });
    updateBulkBar();
  });

  // Filters
  document.getElementById('search-input').addEventListener('input', () => renderVouchers(allVouchers));
  document.getElementById('filter-status').addEventListener('change', loadVouchers);
  document.getElementById('filter-profile').addEventListener('change', loadVouchers);

  // Generate
  document.getElementById('btn-generate').addEventListener('click', async () => {
    const count    = parseInt(document.getElementById('gen-count').value) || 0;
    const profile  = document.getElementById('gen-profile').value;
    const router   = document.getElementById('gen-router').value;
    const alertEl  = document.getElementById('gen-alert');
    if (!count || count < 1) { alertEl.className = 'alert alert-danger'; alertEl.textContent = 'Count must be at least 1.'; return; }
    if (!profile) { alertEl.className = 'alert alert-danger'; alertEl.textContent = 'Select a profile.'; return; }
    if (!router)  { alertEl.className = 'alert alert-danger'; alertEl.textContent = 'Select a router.'; return; }
    document.getElementById('btn-generate').disabled = true;
    try {
      const res  = await fetch('/api/vouchers/generate', { method: 'POST', headers, body: JSON.stringify({ count, profile_id: parseInt(profile), router_id: parseInt(router) }) });
      const data = await res.json();
      if (data.success) {
        bootstrap.Modal.getInstance(document.getElementById('generateModal')).hide();
        showToast(`Generated ${count} voucher(s)`, 'success');
        loadVouchers();
      } else { alertEl.className = 'alert alert-danger'; alertEl.textContent = data.message || 'Generation failed.'; }
    } catch { alertEl.className = 'alert alert-danger'; alertEl.textContent = 'Network error.'; }
    finally { document.getElementById('btn-generate').disabled = false; }
  });

  // Push single
  let pushId = null;
  function openPush(id, username) {
    pushId = id;
    document.getElementById('push-username').textContent = username;
    document.getElementById('push-alert').className = 'alert d-none';
    new bootstrap.Modal(document.getElementById('pushModal')).show();
  }

  document.getElementById('btn-confirm-push').addEventListener('click', async () => {
    if (!pushId) return;
    document.getElementById('btn-confirm-push').disabled = true;
    try {
      const res  = await fetch(`/api/vouchers/${pushId}/push`, { method: 'POST', headers });
      const data = await res.json();
      if (data.success) {
        bootstrap.Modal.getInstance(document.getElementById('pushModal')).hide();
        showToast('Voucher pushed to MikroTik', 'success');
      } else {
        document.getElementById('push-alert').className = 'alert alert-danger';
        document.getElementById('push-alert').textContent = data.message || 'Push failed.';
      }
    } catch {
      document.getElementById('push-alert').className = 'alert alert-danger';
      document.getElementById('push-alert').textContent = 'Network error.';
    }
    document.getElementById('btn-confirm-push').disabled = false;
  });

  // Delete single
  async function deleteVoucher(id) {
    if (!confirm('Delete this voucher?')) return;
    const res  = await fetch(`/api/vouchers/${id}`, { method: 'DELETE', headers });
    const data = await res.json();
    if (data.success) { showToast('Voucher deleted', 'success'); loadVouchers(); }
    else showToast(data.message || 'Delete failed', 'error');
  }

  // Bulk push
  document.getElementById('btn-push-selected').addEventListener('click', async () => {
    if (!selectedIds.size) return;
    let ok = 0, fail = 0;
    for (const id of selectedIds) {
      try {
        const res  = await fetch(`/api/vouchers/${id}/push`, { method: 'POST', headers });
        const data = await res.json();
        if (data.success) ok++; else fail++;
      } catch { fail++; }
    }
    showToast(`Pushed ${ok} voucher(s). Failures: ${fail}`, ok > 0 ? 'success' : 'error');
    selectedIds.clear();
    loadVouchers();
  });

  // Bulk delete
  document.getElementById('btn-delete-selected').addEventListener('click', async () => {
    if (!selectedIds.size || !confirm(`Delete ${selectedIds.size} voucher(s)?`)) return;
    let ok = 0;
    for (const id of selectedIds) {
      const res = await fetch(`/api/vouchers/${id}`, { method: 'DELETE', headers });
      const d   = await res.json();
      if (d.success) ok++;
    }
    showToast(`Deleted ${ok} voucher(s)`, 'success');
    selectedIds.clear();
    loadVouchers();
  });

  // Print
  document.getElementById('btn-print').addEventListener('click', () => window.print());

  // Init
  Promise.all([loadProfiles(), loadRouters()]).then(() => loadVouchers());
</script>
</body>
</html>
