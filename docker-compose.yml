services:
  # ── Hotspay Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotspay_app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-hotspay}
      DB_USER: ${DB_USER:-hotspay_user}
      DB_PASSWORD: ${DB_PASSWORD:-hotspay_password}
      DB_CONNECTION_LIMIT: ${DB_CONNECTION_LIMIT:-10}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      MIKROTIK_HOST: ${MIKROTIK_HOST:-192.168.88.1}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-8728}
      MIKROTIK_USER: ${MIKROTIK_USER:-admin}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD:-}
      MIKROTIK_TLS: ${MIKROTIK_TLS:-false}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-}
      MPESA_ENV: ${MPESA_ENV:-sandbox}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WIREGUARD_ENABLED: ${WIREGUARD_ENABLED:-true}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hotspay_net
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── MySQL Database ───────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hotspay_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-hotspay}
      MYSQL_USER: ${DB_USER:-hotspay_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hotspay_password}
    ports:
      - "${DB_PORT_EXPOSE:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - hotspay_net
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-hotspay_user}", "-p${DB_PASSWORD:-hotspay_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── phpMyAdmin ───────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: hotspay_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-hotspay_user}
      PMA_PASSWORD: ${DB_PASSWORD:-hotspay_password}
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hotspay_net

networks:
  hotspay_net:
    driver: bridge

volumes:
  mysql_data:
  app_uploads:
  app_logs:
