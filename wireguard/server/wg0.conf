[Interface]
# Hotspay WireGuard Server Configuration
# Server IP in WireGuard network
Address = 10.10.10.1/24
ListenPort = 51820
PrivateKey = SERVER_PRIVATE_KEY_HERE

# Enable IP forwarding and NAT for connected routers
PostUp = sysctl -w net.ipv4.ip_forward=1; iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# =====================================================
# PEER CONFIGURATION
# Add one [Peer] section for each MikroTik router
# =====================================================

# Example: Router 1
# [Peer]
# # Router Name: Main-Hotspot-Router
# PublicKey = ROUTER1_PUBLIC_KEY_HERE
# AllowedIPs = 10.10.10.2/32, 192.168.88.0/24
# # Optional: If router is behind NAT
# # PersistentKeepalive = 25

# Example: Router 2
# [Peer]
# # Router Name: Branch-Office-Router
# PublicKey = ROUTER2_PUBLIC_KEY_HERE
# AllowedIPs = 10.10.10.3/32, 192.168.89.0/24
